<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power Agent Dashboard</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: Inter, Segoe UI, sans-serif; margin: 0; background: #0b1020; color: #e8ecff; }
    header { padding: 16px 20px; border-bottom: 1px solid #243058; display:flex; justify-content:space-between; align-items:center; }
    .wrap { display:grid; grid-template-columns: 330px 1fr; gap: 16px; padding: 16px; }
    .card { background:#121933; border:1px solid #243058; border-radius:12px; padding:14px; }
    .ok{ color:#57d38c; } .bad{ color:#ff7b7b; } .muted{ color:#9aa6d1; }
    pre { white-space: pre-wrap; background:#0d1430; padding:10px; border-radius:8px; max-height:300px; overflow:auto; }
    .entry { border-bottom:1px solid #243058; padding:10px 0; }
    .entry:last-child{ border-bottom:none; }
    .title { font-weight:600; }
    button { background:#4f7cff; color:white; border:none; padding:8px 10px; border-radius:8px; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <div>
      <h2 style="margin:0">Power CEO Live Dashboard</h2>
      <div class="muted" id="now">lädt…</div>
    </div>
    <button onclick="load()">Aktualisieren</button>
  </header>

  <div class="wrap">
    <div class="card">
      <h3>Agent Status</h3>
      <p id="statusText">-</p>
      <p class="muted" id="lastEntry">-</p>
      <p class="muted" id="fileMod">-</p>
    </div>

    <div class="card">
      <h3>Arbeitsgang (letzte Läufe)</h3>
      <div id="feed"></div>
    </div>

    <div class="card">
      <h3>PROJECT_STATUS.md</h3>
      <pre id="projectStatus"></pre>
    </div>

    <div class="card">
      <h3>PROJECT_TODO.md</h3>
      <pre id="projectTodo"></pre>
    </div>

    <div class="card" style="grid-column:1 / span 2;">
      <h3>ROADMAP.md</h3>
      <pre id="roadmap"></pre>
    </div>
  </div>

  <script>
    async function load() {
      const res = await fetch('/api/status');
      const data = await res.json();

      document.getElementById('now').textContent = `Stand: ${new Date(data.now).toLocaleString()}`;
      const active = data.agent.active;
      document.getElementById('statusText').innerHTML = active
        ? '<span class="ok">● Aktiv</span>'
        : '<span class="bad">● Inaktiv/keine frischen Logs</span>';

      document.getElementById('lastEntry').textContent = `Letzter Lauf: ${data.agent.latestEntryTitle || '—'}`;
      document.getElementById('fileMod').textContent = `Datei geändert: ${data.agent.activityFileLastModified || '—'}`;

      const feed = document.getElementById('feed');
      feed.innerHTML = '';
      (data.feed.activityEntries || []).slice().reverse().forEach(e => {
        const div = document.createElement('div');
        div.className = 'entry';
        div.innerHTML = `<div class="title">${e.title}</div>` + (e.bullets || []).map(b => `<div>• ${b}</div>`).join('');
        feed.appendChild(div);
      });

      document.getElementById('projectStatus').textContent = data.docs.projectStatus || '';
      document.getElementById('projectTodo').textContent = data.docs.projectTodo || '';
      document.getElementById('roadmap').textContent = data.docs.roadmap || '';
    }

    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
